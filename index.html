<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Central Nuvem - Bot WhatsApp 2026</title>
    <script src="https://socket.io"></script>
    <style>
        body { font-family: "Segoe UI", sans-serif; background: #0b141a; color: #e9edef; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 720px; background: #222e35; padding: 25px; border-radius: 12px; border: 1px solid #2a3942; text-align: center; box-sizing: border-box; }
        h1, h2, h3 { color: #00a884; margin: 0 0 10px 0; }
        .notif-bar { background: #005c4b; border-left: 5px solid #00a884; padding: 12px; border-radius: 6px; text-align: left; font-size: 13px; font-weight: bold; margin-bottom: 20px; display: none; }
        .save-indicator { background: #00a884; color: #fff; padding: 6px 12px; font-size: 11px; font-weight: bold; border-radius: 4px; display: inline-block; margin-top: 5px; opacity: 0; transition: opacity 0.3s; }
        .profiles-grid { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; margin: 30px 0; }
        .profile-card { background: #111b21; border: 2px solid #2a3942; border-radius: 10px; padding: 15px; width: 130px; cursor: pointer; transition: all 0.2s; position: relative; box-sizing: border-box; }
        .profile-card:hover { border-color: #00a884; transform: translateY(-4px); }
        .profile-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; background: #202c33; margin: 0 auto 10px auto; border: 2px solid #2a3942; display: block; pointer-events: none; }
        .profile-name { font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }
        .btn-add-conta { background: transparent; color: #00a884; border: 2px dashed #00a884; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-add-conta:hover { background: rgba(0, 168, 132, 0.1); }
        .btn-back-profiles { background: #202c33; color: #00a884; border: 1px solid #00a884; padding: 6px 12px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; float: left; }
        .checkbox-container { background: #111b21; border: 1px solid #2a3942; border-radius: 6px; max-height: 150px; overflow-y: auto; text-align: left; padding: 12px; margin: 10px 0; }
        .checkbox-item { display: flex; align-items: center; gap: 12px; padding: 6px 0; border-bottom: 1px solid #222e35; font-size: 13px; }
        .checkbox-item input { width: 16px; height: 16px; accent-color: #00a884; cursor: pointer; }
        .media-uploader { border: 2px dashed #00a884; padding: 20px; border-radius: 8px; background: #111b21; margin: 15px 0; cursor: pointer; position: relative; }
        .media-uploader input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .cron-image-block { display: flex; flex-direction: column; background: #111b21; border: 1px solid #2a3942; padding: 15px; border-radius: 8px; margin: 15px 0; gap: 12px; text-align: left; box-sizing: border-box; }
        .cron-image-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 15px; }
        .cron-image-header img { width: 75px; height: 75px; object-fit: cover; border-radius: 6px; border: 1px solid #2a3942; }
        .cron-image-times-flex { display: flex; flex-wrap: wrap; gap: 8px; background: #222e35; padding: 10px; border-radius: 6px; border: 1px solid #2a3942; align-items: center; }
        .time-badge { display: flex; align-items: center; background: #111b21; border: 1px solid #2a3942; padding: 4px 8px; border-radius: 4px; gap: 6px; }
        .time-badge input { background: transparent; border: none; color: #fff; font-size: 12px; font-family: monospace; outline: none; width: 65px; text-align: center; }
        .btn-del-time { background: transparent; color: #ea4335; border: none; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-add-time-trigger { background: #00a884; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .actions-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; border-top: 1px solid #2a3942; padding-top: 10px; gap: 10px; }
        .btn-del-block { background: #ea4335; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 16px; display: flex; justify-content: center; align-items: center; }
        .log-box-area { width: 100%; max-width: 720px; background: #111b21; border: 1px solid #2a3942; margin-top: 20px; border-radius: 8px; padding: 12px; box-sizing: border-box; }
        .log-textarea { width: 100%; height: 130px; background: #0b141a; color: #00ff66; border: none; resize: none; font-family: monospace; font-size: 11px; padding: 8px; box-sizing: border-box; }
        .state-loader-box { background: #111b21; border: 1px solid #2a3942; padding: 25px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 250px; margin: 20px auto; }
        .spinner { width: 35px; height: 35px; border: 4px solid #202c33; border-top: 4px solid #00a884; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        textarea#mensagem-texto { width:100%; height: 70px; background: #111b21; border: 1px solid #2a3942; border-radius: 6px; color: #fff; padding: 10px; box-sizing: border-box; resize: none; font-family: inherit; }
    </style>
</head>
<body>
    <div id="notificacao-disparo" class="notif-bar"></div>
    <div id="central-sistema" class="container">
        <div id="tela-perfis" class="profiles-screen">
            <h1>Selecione o Perfil do WhatsApp</h1>
            <div id="grid-perfis" class="profiles-grid"></div>
            <button class="btn-add-conta" onclick="solicitarNovaConta()">✨ Adicionar Nova Conta</button>
        </div>
        <div id="tela-gerenciamento" style="display:none;">
            <button class="btn-back-profiles" onclick="voltarParaPerfis()">← Alternar Perfil</button>
            <h1 style="clear:both; padding-top:10px;">🤖 Central Multi-WhatsApp</h1>
            <div id="indicador-salvamento" class="save-indicator">✓ Alterações Salvas</div>
            <div id="qrcode-area" class="state-loader-box" style="display: none;">
                <div class="spinner"></div>
                <span id="texto-estado-loading" style="font-size: 12px; color: #8696a0;">Carregando sessão...</span>
            </div>
            <div id="painel-configuracao">
                <h3 id="titulo-instancia" style="text-align:left;">Configurações</h3>
                <label style="display:block; text-align:left; font-size:12px; color:#8696a0;">Grupos Alvo Globais:</label>
                <div id="container-grupos" class="checkbox-container"></div>
                <label style="display:block; text-align:left; font-size:12px; color:#8696a0; margin-top:10px;">Legenda/Texto Padrão Fallback:</label>
                <textarea id="mensagem-texto" placeholder="Texto de fallback..." oninput="sinalizarAlteracaoComDebounce()"></textarea>
                
                <div class="media-uploader">
                    <span style="font-size:13px; color:#00a884; font-weight:bold;">📂 Selecionar Imagem Principal</span>
                    <input type="file" accept="image/*" onchange="fazerUploadImagemNuvem(this)">
                </div>
                <div id="lista-blocks-imagens"></div>
            </div>
        </div>
    </div>
    <div id="area-logs-sistema" class="log-box-area">
        <div style="display:flex; justify-content:space-between; color:#00a884; font-size:12px; margin-bottom:6px;">
            <span>📟 LOGS DO SISTEMA (NUVEM)</span>
        </div>
        <textarea id="console-logs-painel" class="log-textarea" readonly placeholder="Aguardando eventos..."></textarea>
    </div>

    <script>
        const SERVIDOR_URL = "https://onrender.com"; 
        
        const socket = io(SERVIDOR_URL, { 
            transports: ['websocket', 'polling'],
            upgrade: true,
            secure: true 
        });

        let contaAtiva = "";
        let cacheContas = {};
        let temporizadorDebounce = null;
        const fallbackAvatar = "data:image/svg+xml;utf8,<svg xmlns='http://w3.org' viewBox='0 0 24 24' fill='%232a3942'><circle cx='12' cy='12' r='12'/><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z' fill='%238696a0'/></svg>";

        socket.on("connect", () => {
            logServidor("Conectado ao barramento de nuvem com sucesso.");
            socket.emit("front-pronto-sincronizar");
        });

        socket.on("connect_error", (error) => {
            logServidor("Re-conectando ao canal de eventos...");
        });

        socket.on("sincronizar-contas-inicial", (contas) => {
            cacheContas = {};
            contas.forEach(c => {
                cacheContas[c.idConta] = { listaGrupos: [], configuracaoSalva: c };
            });
            renderizarGradePerfisNativos();
        });

        socket.off("bot-conectado-multi");
        socket.on("bot-conectado-multi", (p) => {
            if (p.idAntigo && cacheContas[p.idAntigo]) delete cacheContas[p.idAntigo];
            cacheContas[p.idConta] = { listaGrupos: p.listaGrupos, configuracaoSalva: p.configuracaoSalva };
            renderizarGradePerfisNativos();
            if (contaAtiva === p.idConta || contaAtiva === p.idAntigo) abrirPainelGerenciamentoConta(p.idConta);
        });

        socket.on("notificar-disparo", (d) => {
            const notif = document.getElementById("notificacao-disparo");
            if(notif) {
                notif.innerText = `[CRON] Disparo automatizado executado para a conta: ${d.idConta}`;
                notif.style.display = "block";
                setTimeout(() => { notif.style.display = "none"; }, 5000);
            }
        });

        function solicitarNovaConta() { 
            logServidor("Solicitando inicialização de nova instância Baileys...");
            socket.emit("adicionar-nova-conta"); 
        }
        
        function voltarParaPerfis() {
            document.getElementById("tela-gerenciamento").style.display = "none";
            document.getElementById("tela-perfis").style.display = "block";
            contaAtiva = "";
            socket.emit("front-pronto-sincronizar");
        }

        function logServidor(m) {
            const el = document.getElementById("console-logs-painel");
            if (el) { el.value += `[${new Date().toLocaleTimeString()}] ${m}\n`; el.scrollTop = el.scrollHeight; }
        }

        function renderizarGradePerfisNativos() {
            const grid = document.getElementById("grid-perfis"); if(!grid) return;
            grid.innerHTML = "";
            Object.keys(cacheContas).forEach(id => {
                const cData = cacheContas[id].configuracaoSalva || {};
                const foto = cData.fotoPerfilUrl || fallbackAvatar;
                const card = document.createElement("div");
                card.className = "profile-card";
                card.innerHTML = `<img src="${foto}" class="profile-avatar" onerror="this.src='${fallbackAvatar}'"><div class="profile-name">${id}</div>`;
                card.onclick = () => abrirPainelGerenciamentoConta(id);
                grid.appendChild(card);
            });
        }

        function abrirPainelGerenciamentoConta(id) {
            contaAtiva = id;
            document.getElementById("tela-perfis").style.display = "none";
            document.getElementById("tela-gerenciamento").style.display = "block";
            const dados = cacheContas[id];
            
            socket.off(`qr-${id}`);
            socket.on(`qr-${id}`, (qrBase64Url) => {
                const box = document.getElementById("qrcode-area");
                box.style.display = "flex"; box.style.background = "#fff";
                box.innerHTML = `<img src="${qrBase64Url}" width="200" height="200">`;
            });

            if (!dados || !dados.listaGrupos || dados.listaGrupos.length === 0) {
                const box = document.getElementById("qrcode-area");
                box.style.display = "flex"; box.style.background = "#111b21";
                box.innerHTML = `<div class="spinner"></div><span style="font-size:12px; color:#8696a0; margin-top:10px;">Aguardando Conexão/QR Code...</span>`;
                document.getElementById("painel-configuracao").style.opacity = "0.3";
                document.getElementById("painel-configuracao").style.pointerEvents = "none";
                return;
            }

            document.getElementById("qrcode-area").style.display = "none";
            document.getElementById("painel-configuracao").style.opacity = "1";
            document.getElementById("painel-configuracao").style.pointerEvents = "all";
            document.getElementById("titulo-instancia").innerText = `Conectado: ${id}`;
            
            const container = document.getElementById("container-grupos"); container.innerHTML = "";
            const alvos = dados.configuracaoSalva.gruposSelecionados || [];
            
            dados.listaGrupos.forEach(g => {
                const item = document.createElement("div"); item.className = "checkbox-item";
                item.innerHTML = `<input type="checkbox" value="${g.id}" ${alvos.includes(g.id)?'checked':''}> <label>${g.name}</label>`;
                item.querySelector('input').onchange = () => sinalizarAlteracao();
                container.appendChild(item);
            });

            document.getElementById("mensagem-texto").value = dados.configuracaoSalva.texto || "";
            renderizarBlocosImagens(dados.configuracaoSalva.imagensCron || []);
        }

        async function fazerUploadImagemNuvem(inputElement) {
            if (!contaAtiva || !inputElement.files || inputElement.files.length === 0) return;
            
            logServidor("Processando compressão e buffer da imagem...");
            const arquivoAlvo = inputElement.files[0]; 
            const reader = new FileReader();
            
            reader.readAsDataURL(arquivoAlvo);
            reader.onloadend = async () => {
                const base64 = reader.result;
                
                try {
                    const res = await fetch(`${SERVIDOR_URL}/api/upload`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ imageBase64: base64 })
                    });
                    const data = await res.json();
                    
                    if (data.url) {
                        logServidor("Mídia hospedada com sucesso na nuvem.");
                        const arr = cacheContas[contaAtiva].configuracaoSalva.imagensCron || [];
                        arr.push({ caminho: base64, textIndividual: "", extras: [], horariosDinamicos: ["08:00"] });
                        cacheContas[contaAtiva].configuracaoSalva.imagensCron = arr;
                        renderizarBlocosImagens(arr);
                        sinalizarAlteracao();
                    } else {
                        logServidor("Erro no retorno da API de upload.");
                    }
                } catch(e) {
